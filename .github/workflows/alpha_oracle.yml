name: Alpha-Oracle-Final-Official
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  trade_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install Dependencies
        run: pip install requests pandas numpy
      - name: Run Alpha Oracle Bot
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f active_trades.csv trade_history.csv 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update trade logs [skip ci]"
          git push
